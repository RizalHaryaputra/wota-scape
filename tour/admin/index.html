<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <title>Login Admin — WotaScape</title>

    <!-- ===== FONTS ===== -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:wght@600;700&display=swap"
        rel="stylesheet">

    <link rel="icon" href="/public/images/wota-scape-logo.png" type="image/png">

    <!-- ===== ICONS ===== -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <!-- ===== TAILWIND CSS ===== -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        forest: '#2d5a27',
                        leaf: '#4a8c3f',
                        jade: '#3d7a5e',
                        amber: '#d4a843',
                        cream: '#f5f0e8',
                    }
                }
            }
        }
    </script>

    <style>
        * {
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            min-height: 100svh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px 16px;
            background-color: #07120a;
            overflow: hidden;
            position: relative;
        }

        /* ── Animated mesh background ── */
        .bg-mesh {
            position: fixed;
            inset: 0;
            z-index: 0;
            background:
                radial-gradient(ellipse 80% 60% at 15% 20%, rgba(45, 90, 39, 0.35) 0%, transparent 60%),
                radial-gradient(ellipse 60% 70% at 85% 80%, rgba(61, 122, 94, 0.25) 0%, transparent 55%),
                radial-gradient(ellipse 50% 50% at 50% 50%, rgba(212, 168, 67, 0.06) 0%, transparent 70%),
                #07120a;
        }

        /* Floating orbs */
        .orb {
            position: fixed;
            border-radius: 50%;
            filter: blur(90px);
            pointer-events: none;
            z-index: 0;
        }

        .orb-1 {
            width: 350px;
            height: 350px;
            top: -80px;
            left: -80px;
            background: rgba(45, 90, 39, 0.3);
            animation: orbFloat 12s ease-in-out infinite;
        }

        .orb-2 {
            width: 280px;
            height: 280px;
            bottom: -60px;
            right: -60px;
            background: rgba(61, 122, 94, 0.25);
            animation: orbFloat 15s ease-in-out infinite reverse;
        }

        .orb-3 {
            width: 200px;
            height: 200px;
            top: 50%;
            right: 10%;
            background: rgba(212, 168, 67, 0.08);
            animation: orbFloat 10s ease-in-out infinite 3s;
        }

        @keyframes orbFloat {

            0%,
            100% {
                transform: translate(0, 0) scale(1);
            }

            33% {
                transform: translate(20px, -15px) scale(1.05);
            }

            66% {
                transform: translate(-10px, 10px) scale(0.97);
            }
        }

        /* Grid dots overlay */
        .grid-dots {
            position: fixed;
            inset: 0;
            z-index: 0;
            background-image: radial-gradient(rgba(74, 140, 63, 0.12) 1px, transparent 1px);
            background-size: 32px 32px;
            pointer-events: none;
        }

        /* ── Card ── */
        .login-card {
            position: relative;
            z-index: 10;
            width: 100%;
            max-width: 400px;
            background: rgba(255, 255, 255, 0.035);
            border: 1px solid rgba(74, 140, 63, 0.25);
            border-radius: 24px;
            padding: 40px 36px;
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            box-shadow:
                0 32px 80px rgba(0, 0, 0, 0.5),
                0 0 0 1px rgba(255, 255, 255, 0.04),
                inset 0 1px 0 rgba(255, 255, 255, 0.07);
            animation: slideUp 0.7s cubic-bezier(0.22, 1, 0.36, 1) both;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px) scale(0.97);
            }

            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        /* Card top glow border */
        .login-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 20%;
            right: 20%;
            height: 1px;
            background: linear-gradient(90deg,
                    transparent, rgba(74, 140, 63, 0.6), rgba(212, 168, 67, 0.4), rgba(74, 140, 63, 0.6), transparent);
            border-radius: 2px;
        }

        /* ── Logo ── */
        .logo-wrap {
            width: 64px;
            height: 64px;
            border-radius: 18px;
            background: linear-gradient(135deg, #1a3320 0%, #2d5a27 50%, #3d7a5e 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.6rem;
            color: #f5f0e8;
            box-shadow:
                0 8px 24px rgba(45, 90, 39, 0.5),
                inset 0 1px 0 rgba(255, 255, 255, 0.15);
            animation: logoPulse 3s ease-in-out infinite;
        }

        @keyframes logoPulse {

            0%,
            100% {
                box-shadow: 0 8px 24px rgba(45, 90, 39, 0.5), inset 0 1px 0 rgba(255, 255, 255, 0.15);
            }

            50% {
                box-shadow: 0 8px 32px rgba(74, 140, 63, 0.7), inset 0 1px 0 rgba(255, 255, 255, 0.15);
            }
        }

        /* ── Inputs ── */
        .input-wrap {
            position: relative;
            margin-top: 6px;
        }

        .input-icon {
            position: absolute;
            top: 50%;
            left: 14px;
            transform: translateY(-50%);
            color: rgba(245, 240, 232, 0.3);
            font-size: 0.85rem;
            pointer-events: none;
            transition: color 0.2s;
        }

        .form-input {
            width: 100%;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 11px 14px 11px 40px;
            font-size: 0.875rem;
            font-family: 'Inter', sans-serif;
            color: #f5f0e8;
            transition: all 0.25s ease;
            outline: none;
        }

        .form-input::placeholder {
            color: rgba(245, 240, 232, 0.25);
        }

        .form-input:focus {
            background: rgba(74, 140, 63, 0.08);
            border-color: rgba(74, 140, 63, 0.55);
            box-shadow: 0 0 0 3px rgba(74, 140, 63, 0.12), 0 0 16px rgba(74, 140, 63, 0.1);
        }

        .form-input:focus+.input-focus-ring {
            opacity: 1;
        }

        .input-wrap:focus-within .input-icon {
            color: rgba(74, 140, 63, 0.8);
        }

        /* Password toggle */
        .toggle-pw {
            position: absolute;
            top: 50%;
            right: 12px;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: rgba(245, 240, 232, 0.3);
            cursor: pointer;
            font-size: 0.8rem;
            padding: 4px;
            transition: color 0.2s;
        }

        .toggle-pw:hover {
            color: rgba(245, 240, 232, 0.7);
        }

        /* ── Submit button ── */
        .btn-submit {
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 13px;
            border-radius: 12px;
            font-size: 0.875rem;
            font-weight: 600;
            font-family: 'Inter', sans-serif;
            letter-spacing: 0.03em;
            color: #f5f0e8;
            background: linear-gradient(135deg, #2d5a27 0%, #4a8c3f 60%, #3d7a5e 100%);
            border: 1px solid rgba(74, 140, 63, 0.5);
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
            box-shadow: 0 4px 16px rgba(45, 90, 39, 0.45), inset 0 1px 0 rgba(255, 255, 255, 0.1);
            position: relative;
            overflow: hidden;
        }

        .btn-submit::after {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.08) 0%, transparent 60%);
            opacity: 0;
            transition: opacity 0.25s;
        }

        .btn-submit:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 8px 28px rgba(45, 90, 39, 0.6), inset 0 1px 0 rgba(255, 255, 255, 0.12);
        }

        .btn-submit:hover::after {
            opacity: 1;
        }

        .btn-submit:active:not(:disabled) {
            transform: translateY(0) scale(0.98);
        }

        .btn-submit:disabled {
            opacity: 0.55;
            cursor: not-allowed;
            transform: none;
        }

        /* ── Alert ── */
        .alert-error {
            display: none;
            align-items: center;
            gap: 10px;
            padding: 12px 14px;
            border-radius: 12px;
            background: rgba(239, 68, 68, 0.12);
            border: 1px solid rgba(239, 68, 68, 0.3);
            color: #fca5a5;
            font-size: 0.8rem;
            line-height: 1.4;
            margin-bottom: 20px;
            animation: shakeX 0.4s ease;
        }

        .alert-error.show {
            display: flex;
        }

        @keyframes shakeX {

            0%,
            100% {
                transform: translateX(0);
            }

            20% {
                transform: translateX(-6px);
            }

            40% {
                transform: translateX(6px);
            }

            60% {
                transform: translateX(-4px);
            }

            80% {
                transform: translateX(4px);
            }
        }

        /* ── Label ── */
        .form-label {
            display: block;
            font-size: 0.78rem;
            font-weight: 500;
            color: rgba(245, 240, 232, 0.65);
            margin-bottom: 6px;
            letter-spacing: 0.03em;
        }

        /* ── Divider ── */
        .card-divider {
            height: 1px;
            background: linear-gradient(90deg,
                    transparent, rgba(74, 140, 63, 0.2), rgba(212, 168, 67, 0.15), rgba(74, 140, 63, 0.2), transparent);
            margin: 24px 0;
        }

        /* ── Scrollbar ── */
        ::-webkit-scrollbar {
            width: 4px;
        }

        ::-webkit-scrollbar-track {
            background: #07120a;
        }

        ::-webkit-scrollbar-thumb {
            background: #4a8c3f;
            border-radius: 2px;
        }
    </style>
</head>

<body>

    <!-- ── Background layers ── -->
    <div class="bg-mesh" aria-hidden="true"></div>
    <div class="grid-dots" aria-hidden="true"></div>
    <div class="orb orb-1" aria-hidden="true"></div>
    <div class="orb orb-2" aria-hidden="true"></div>
    <div class="orb orb-3" aria-hidden="true"></div>

    <!-- ===== LOGIN CARD ===== -->
    <main class="login-card">

        <!-- ── Logo & Brand ── -->
        <div style="text-align:center;margin-bottom:28px;">
            <div style="display:flex;justify-content:center;margin-bottom:16px;">
                <img class="h-12 w-12" src="/public/images/wota-scape-logo.png" alt="WotaScape Logo" class="brand-badge-icon">
            </div>
            <h1
                style="font-family:'Playfair Display',serif;font-size:1.5rem;font-weight:700;color:#f5f0e8;letter-spacing:0.02em;margin:0 0 4px;">
                WotaScape
            </h1>
            <p
                style="font-size:0.72rem;font-weight:500;color:rgba(212,168,67,0.7);letter-spacing:0.18em;text-transform:uppercase;margin:0;">
                Admin Panel
            </p>
        </div>

        <!-- ── Card Divider ── -->
        <div class="card-divider"></div>

        <!-- ── Alert Error ── -->
        <div id="alertMessage" class="alert-error" role="alert">
            <i class="fa-solid fa-triangle-exclamation" style="flex-shrink:0;font-size:0.9rem;"></i>
            <span id="alertText"></span>
        </div>

        <!-- ── Form Login ── -->
        <form id="loginForm" novalidate style="display:flex;flex-direction:column;gap:18px;">

            <!-- Email -->
            <div>
                <label for="email" class="form-label">
                    <i class="fa-regular fa-envelope me-1" style="color:rgba(74,140,63,0.7);"></i>
                    Alamat Email
                </label>
                <div class="input-wrap">
                    <i class="input-icon fa-regular fa-envelope"></i>
                    <input type="email" id="email" name="email" required autocomplete="email"
                        placeholder="admin@WotaScape.id" class="form-input">
                </div>
            </div>

            <!-- Password -->
            <div>
                <label for="password" class="form-label">
                    <i class="fa-solid fa-lock me-1" style="color:rgba(74,140,63,0.7);"></i>
                    Password
                </label>
                <div class="input-wrap">
                    <i class="input-icon fa-solid fa-lock"></i>
                    <input type="password" id="password" name="password" required autocomplete="current-password"
                        placeholder="••••••••" class="form-input" style="padding-right:40px;">
                    <button type="button" class="toggle-pw" id="togglePw" title="Tampilkan password"
                        aria-label="Toggle visibilitas password">
                        <i class="fa-regular fa-eye" id="eyeIcon"></i>
                    </button>
                </div>
            </div>

            <!-- Submit -->
            <button type="submit" id="btnSubmit" class="btn-submit" style="margin-top:6px;">
                <i class="fa-solid fa-right-to-bracket"></i>
                Masuk ke Dashboard
            </button>

        </form>

        <!-- ── Footer Note ── -->
        <div class="card-divider"></div>
        <p style="text-align:center;font-size:0.68rem;color:rgba(245,240,232,0.22);letter-spacing:0.08em;">
            &copy; 2026 WotaScape &mdash; Akses khusus administrator
        </p>

    </main>

    <!-- ===== FIREBASE AUTH SCRIPT ===== -->
    <script type="module">
        import { auth, signInWithEmailAndPassword, onAuthStateChanged }
            from '../js/firebase-config.js';

        const loginForm = document.getElementById('loginForm');
        const btnSubmit = document.getElementById('btnSubmit');
        const alertBox = document.getElementById('alertMessage');
        const alertText = document.getElementById('alertText');
        const togglePw = document.getElementById('togglePw');
        const pwInput = document.getElementById('password');
        const eyeIcon = document.getElementById('eyeIcon');

        /* ── Toggle password visibility ── */
        togglePw.addEventListener('click', () => {
            const isHidden = pwInput.type === 'password';
            pwInput.type = isHidden ? 'text' : 'password';
            eyeIcon.className = isHidden ? 'fa-regular fa-eye-slash' : 'fa-regular fa-eye';
        });

        /** Tampilkan pesan error */
        function showError(message) {
            alertText.textContent = message;
            alertBox.classList.add('show');
            // shake animation restart
            alertBox.style.animation = 'none';
            alertBox.offsetHeight; // reflow
            alertBox.style.animation = '';
        }

        /** Sembunyikan alert */
        function hideError() {
            alertBox.classList.remove('show');
        }

        /* Redirect otomatis jika sudah login */
        onAuthStateChanged(auth, (user) => {
            if (user) window.location.href = 'dashboard.html';
        });

        /* Submit */
        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            hideError();

            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;

            if (!email || !password) {
                showError('Silakan isi email dan password terlebih dahulu.');
                return;
            }

            btnSubmit.disabled = true;
            btnSubmit.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Memproses...';

            try {
                await signInWithEmailAndPassword(auth, email, password);
                window.location.href = 'dashboard.html';
            } catch (error) {
                console.error('Login error:', error);

                const errorMessages = {
                    'auth/invalid-credential': 'Email atau password salah.',
                    'auth/user-not-found': 'Akun tidak ditemukan.',
                    'auth/wrong-password': 'Password salah.',
                    'auth/too-many-requests': 'Terlalu banyak percobaan. Coba beberapa saat lagi.',
                    'auth/invalid-email': 'Format email tidak valid.',
                    'auth/network-request-failed': 'Tidak ada koneksi internet.',
                };

                showError(errorMessages[error.code] || 'Login gagal. Silakan coba lagi.');

                btnSubmit.disabled = false;
                btnSubmit.innerHTML = '<i class="fa-solid fa-right-to-bracket"></i> Masuk ke Dashboard';
            }
        });
    </script>

</body>

</html>
