<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Admin KAVVIAR</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light d-flex align-items-center justify-content-center" style="height: 100vh;">

    <div class="card shadow p-4 mx-4" style="width: 100%; max-width: 400px;">
        <h3 class="text-center mb-4">Admin KAVVIAR</h3>

        <div id="alertMessage" class="alert alert-danger d-none"></div>

        <form id="loginForm">
            <div class="mb-3">
                <label class="form-label">Email</label>
                <input type="email" id="email" class="form-control" required>
            </div>
            <div class="mb-3">
                <label class="form-label">Password</label>
                <input type="password" id="password" class="form-control" required>
            </div>
            <button type="submit" class="btn mt-2 text-white w-100 py-2 px-3" style="background-color:#8B4513;"
                onmouseover="this.style.backgroundColor='#6f370f'" onmouseout="this.style.backgroundColor='#8B4513'">Masuk</button>
        </form>
    </div>

    <script type="module">
        import { auth, signInWithEmailAndPassword, onAuthStateChanged } from '../js/firebase-config.js';

        onAuthStateChanged(auth, (user) => {
            if (user) {
                console.log("User sudah login, redirecting...");
                window.location.href = "dashboard.html";
            }
        });

        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const alertMsg = document.getElementById('alertMessage');

            try {
                const userCredential = await signInWithEmailAndPassword(auth, email, password);
                console.log("Login sukses:", userCredential.user);

                window.location.href = 'dashboard.html';

            } catch (error) {
                console.error(error);
                alertMsg.textContent = "Login Gagal: " + error.message;
                alertMsg.classList.remove('d-none');
            }
        });
    </script>
</body>

</html>
