<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Jelajahi Sentra Kerajinan Batik Kayu Krebet secara virtual dari mana saja.">
    <title>KAVVIAR — Virtual Tour Desa Wisata Krebet</title>

    <!-- ===== FONTS ===== -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Poppins:wght@300;400;500&display=swap"
        rel="stylesheet">

    <!-- ===== ICONS ===== -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <!-- ===== ANIMATE.CSS ===== -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css">

    <!-- ===== TAILWIND CSS CDN ===== -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        playfair: ['"Playfair Display"', 'serif'],
                        poppins: ['Poppins', 'sans-serif'],
                    },
                    colors: {
                        gold: '#FFD700',
                        saddlebrown: '#8B4513',
                    },
                    dropShadow: {
                        'title': '2px 2px 10px rgba(0,0,0,0.8)',
                    }
                }
            }
        }
    </script>
</head>

<!-- Overflow hidden agar video background tidak scroll -->

<body class="font-poppins h-screen w-screen overflow-hidden bg-black">

    <!-- ===== BACKGROUND VIDEO ===== -->
    <video autoplay muted loop playsinline class="fixed inset-0 w-full h-full object-cover -z-10 opacity-90"
        aria-hidden="true">
        <source src="videos/bgvideo.mp4" type="video/mp4">
    </video>

    <!-- ===== DARK OVERLAY ===== -->
    <div class="fixed inset-0 bg-black/55 -z-[5]" aria-hidden="true"></div>

    <!-- ===== HERO CONTENT ===== -->
    <main class="relative z-10 h-full flex flex-col justify-center items-center text-center text-white px-5">

        <!-- Title -->
        <div class="animate__animated animate__fadeInDown">
            <p class="font-poppins text-xs md:text-sm font-light tracking-[0.4em] uppercase text-white/70 mb-3">
                Desa Wisata Krebet — Bantul, Yogyakarta
            </p>
            <h1 class="font-playfair text-5xl md:text-7xl font-bold text-gold drop-shadow-title leading-tight">
                Virtual Tour
            </h1>
            <div class="w-24 h-px bg-gold/60 mx-auto my-5"></div>
        </div>

        <!-- Subtitle & CTA -->
        <div class="animate__animated animate__fadeInUp animate__delay-1s flex flex-col items-center gap-6">
            <p class="hidden md:block text-base leading-relaxed max-w-lg text-white/80">
                Jelajahi Keindahan Sentra Kerajinan Batik Kayu <br>
                secara Virtual dari Mana Saja
            </p>

            <a href="tour"
                class="group inline-flex items-center gap-3 px-10 py-4 text-sm font-medium tracking-widest uppercase text-white bg-transparent border border-gold/80 rounded-full transition-all duration-300 hover:bg-gold hover:border-gold hover:text-saddlebrown hover:-translate-y-1 hover:shadow-[0_12px_30px_rgba(255,215,0,0.25)]">
                Mulai Jelajah
                <i
                    class="fa-solid fa-arrow-right text-xs transition-transform duration-300 group-hover:translate-x-1.5"></i>
            </a>
        </div>

    </main>

    <!-- ===== FOOTER ===== -->
    <footer
        class="absolute bottom-4 w-full text-center text-white/40 text-xs z-20 pointer-events-none tracking-widest uppercase">
        &copy; 2026 KAVVIAR — All rights reserved.
    </footer>

</body>

</html>
